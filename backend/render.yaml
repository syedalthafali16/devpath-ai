services:
  - type: web
    name: devpath-ai-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"

    envVars:
      - key: SECRET_KEY
        sync: false

      - key: DEBUG
        value: False

      - key: GEMINI_API_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: devpath-db
          property: connectionString

databases:
  - name: devpath-db